<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝海MVP测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐑 小羊的蓝海测试</h1>
        <p>这是一个自动化部署测试项目。每天早上8点，小羊会自动生成并部署2-3个蓝海MVP应用。</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-number">100</div>
                <div class="stat-label">每日收集</div>
            </div>
            <div class="stat">
                <div class="stat-number">2-3</div>
                <div class="stat-label">精选MVP</div>
            </div>
            <div class="stat">
                <div class="stat-number">∞</div>
                <div class="stat-label">蓝海潜力</div>
            </div>
        </div>

        <button onclick="alert('✅ 自动化部署测试成功！')">
            测试按钮
        </button>

        <div class="footer">
            由小羊自动生成 | 2026-03-18
        </div>
    </div>
</body>
</html>
